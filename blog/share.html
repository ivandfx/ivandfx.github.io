<div id="share-container"><hr class="separator">
<span>¿Quieres compartir este post?</span>
<div class="share-group">
  <a id="share-copy" class="share-btn copy-btn" href="#" title="Copiar" onclick="handleCopyShare(event)">
    <i class="fa-solid fa-link"></i>
  </a>

  <a id="share-twitter" class="share-btn twitter-btn" href="#" onclick="handleTwitterShare(event)">
    <i class="fab fa-x-twitter"></i> <span>X</span>
  </a>

  <a id="share-bluesky" class="share-btn bluesky-btn" href="#" onclick="handleBlueskyShare(event)">
    <i class="fab fa-bluesky"></i> <span>Bluesky</span>
  </a>

  <a id="share-facebook" class="share-btn facebook-btn" href="#" onclick="handleFacebookShare(event)">
    <i class="fab fa-facebook"></i> <span>Facebook</span>
  </a>

  <a id="share-whatsapp" class="share-btn whatsapp-btn" href="#" onclick="handleWhatsappShare(event)">
    <i class="fab fa-whatsapp"></i> <span>WhatsApp</span>
  </a>

  <a id="share-telegram" class="share-btn telegram-btn" href="#" onclick="handleTelegramShare(event)">
    <i class="fab fa-telegram"></i> <span>Telegram</span>
  </a>
</div></div>
