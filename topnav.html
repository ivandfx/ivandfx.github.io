<header class="topnav">
  <div class="container">
    <div class="logo" style="display: flex; align-items: center; gap: 10px;">
      <img src="img/logo.png" alt="Logo"></img>
      <span id="desarrollo" style="font-size: 0.85rem; font-weight: bold; color: #000000; background-color: #8dcaca; padding: 2px 6px; border-radius: 4px;">EN DESARROLLO</span>
    </div>

    <div class="middle-section">
      <nav class="nav-links" id="navLinks">
        <div class="dropdown-wrapper">
          <a href="index.html">INICIO</a>
        </div>
        <div class="dropdown-wrapper">
          <a href="#" class="dropdown" onclick="toggleDropdown(event, this, 'recent-dropdown')">PÁGINAS</a>
          <div class="dropdown-menu" id="recent-dropdown">
          </div>
        </div>
        <div class="dropdown-wrapper">
          <a href="#" class="dropdown" onclick="toggleDropdown(event, this, 'archive-dropdown')">PROYECTOS</a>
          <div class="dropdown-menu" id="archive-dropdown">
            <a href="fnkeys.html">fnKeys</a>
            <a href="DFXWinTweaks.html">DFX WinTweaks (EOL)</a>
          </div>
        </div>
        <div class="dropdown-wrapper">
          <a href="#">SOBRE MÍ</a>
        </div>
        <div class="dropdown-wrapper">
          <a href="directo.html">EN DIRECTO</a>
        </div>
      </nav>

      <i class="fas fa-bars hamburger" onclick="toggleMenu()"></i>
    </div>

    <div class="social-icons">
      <span class="search-icon">
        <i class="fas fa-search"></i>
        <input type="text" class="search-input" placeholder="Buscar (BETA)">
      </span>
    </div>
  </div>
</header>

<script>
  const navLinks = document.getElementById("navLinks");
  const desarrolloText = document.getElementById("desarrollo");

  function toggleMenu() {
    navLinks.classList.toggle("active");

    if (navLinks.classList.contains("active")) {
      desarrolloText?.classList.add("hidden");
    } else {
      desarrolloText?.classList.remove("hidden");
    }
  }

  // hide menu when click oytside
  document.addEventListener("click", (e) => {
    const isClickInsideNav = navLinks.contains(e.target);
    const isHamburger = e.target.closest(".hamburger");

    if (!isClickInsideNav && !isHamburger && navLinks.classList.contains("active")) {
      navLinks.classList.remove("active");
      desarrolloText?.classList.remove("hidden");
    }
  });

  // close menu when click url
  document.querySelectorAll("#navLinks a").forEach(link => {
    link.addEventListener("click", () => {
      navLinks.classList.remove("active");
      desarrolloText?.classList.remove("hidden");
    });
  });
</script>
