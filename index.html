<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ivandfx - home</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #3f3f3f;
      color: #ffffff;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background-color: #8dcaca;
      color: #3f3f3f;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    .container {
      flex: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 50px 20px;
      text-align: center;
    }

    .intro {
      font-size: 1.2rem;
      margin-bottom: 30px;
    }

    .button-group {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .cta-button {
      background-color: #007bff;
      color: white;
      padding: 15px 25px;
      font-size: 1.2rem;
      text-decoration: none;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }

    .cta-button:hover {
      background-color: #8dcaca;
      color: #3f3f3f;
    }

    footer {
      background-color: #333;
      color: white;
      padding: 20px 0;
      font-size: 0.9rem;
      text-align: center;
    }

    footer a {
      color: #8dcaca;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <header>
    <h1>ivandfx - home (temporarily)</h1>
  </header>

  <div class="container">
    <p class="intro">Current projects.</p>
    <div class="button-group">
      <a href="https://github.com/ivandfx" class="cta-button" target="_blank">GitHub</a>
      <a href="https://ivandfx.github.io/DFXWinTweaks" class="cta-button" target="_blank">DFX WinTweaks</a>
      <a href="https://github.com/ivandfx/fnkeys" class="cta-button" target="_blank">FnKeys</a>
      <a href="https://linktr.ee/ivandfx" class="cta-button" target="_blank">Socials</a>
    </div>
  </div>

  <footer>
    <p>2025 <strong>ivandfx</strong><br></p>
  </footer>

</body>
</html>
