<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ivandfx - home</title>
  <link rel="stylesheet" href="style.css" />
  <link 
    rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" 
    integrity="sha512-..." 
    crossorigin="anonymous" 
    referrerpolicy="no-referrer" 
  />
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300&display=swap" rel="stylesheet">
</head>
<body>
  <div class="background-blur"></div>

  <header>
    <img src="img/logoShadow.png" alt="Logo" />
    <div class="web-alpha">WEBSITE IN DEVELOPMENT</div>

    <nav id="nav-menu">
      <a href="#about-me">About Me</a>
      <a href="#projects">Projects</a>
      <a href="#socials">Social Media</a>
      <button id="toggle-dark">🌙</button>
    </nav>

    <button id="hamburger" aria-label="Menu">&#9776;</button>
  </header>

  <main>
    <section id="about-me" class="fade-in">
      <div class="intro-container">
        <div class="intro-text">
          <h1>Hello, I'm ivandfx</h1>
          <p>And this is my personal portfolio.</p>
        </div>
        <img class="intro-image" src="img/IMAGE.png" alt="ivandfx" />
      </div>
    </section>

    <section id="projects" class="fade-in">
      <h2>My Projects (SOON)</h2>
      <p>Here I will showcase my GitHub projects.</p>
    </section>

    <section id="socials" class="fade-in">
      <h2>Social Media</h2>
      <div class="redes">
        <a href="https://github.com/ivandfx" target="_blank"><i class="fab fa-github"></i></a>
        <a href="https://www.youtube.com/@ivandfx" target="_blank"><i class="fab fa-youtube"></i></a>
        <a href="https://www.twitch.tv/ivandfx" target="_blank"><i class="fab fa-twitch"></i></a>
        <a href="https://twitter.com/ivandfx" target="_blank"><i class="fab fa-twitter"></i></a>
        <a href="https://www.instagram.com/ivandfx" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.tiktok.com/@ivandfx" target="_blank"><i class="fab fa-tiktok"></i></a>
        <a href="https://bsky.app/profile/ivandfx.bsky.social" target="_blank"><i class="fab fa-bluesky"></i></a>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 ivandfx</p>
  </footer>

  <script>
    const toggle = document.getElementById('toggle-dark');
    const body = document.body;
    const savedTheme = localStorage.getItem('theme');

    if (savedTheme === 'dark') {
      body.classList.add('dark-mode');
      toggle.textContent = '🌙';
    } else {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (prefersDark) {
        body.classList.add('dark-mode');
        toggle.textContent = '🌙';
      }
    }

    toggle.addEventListener('click', () => {
      body.classList.toggle('dark-mode');
      const isDark = body.classList.contains('dark-mode');
      toggle.textContent = isDark ? '🌙' : '☀️';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('nav-menu');

    hamburger.addEventListener('click', () => {
      navMenu.classList.toggle('show');
    });
  </script>
</body>
</html>
