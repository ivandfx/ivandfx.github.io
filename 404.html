<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ivandfx - 404</title>
  <link rel="stylesheet" href="style.css" />
  <link 
    rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" 
    integrity="sha512-..." 
    crossorigin="anonymous" 
    referrerpolicy="no-referrer" 
  />
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300&display=swap" rel="stylesheet">
</head>
<body>
  <div class="background-blur"></div>

  <header>
    <img src="img/logoShadow.png" alt="Logo" />

    <nav id="nav-menu">
      <button id="toggle-dark">🌙</button>
    </nav>

    <button id="hamburger" aria-label="Menu">&#9776;</button>
  </header>

  <main>
    <section id="about-me" class="fade-in">
      <div class="intro-container">
        <div class="intro-text">
          <h1>This website is undergoing maintenance</h1>
          <p>Will be back soon</p>
        </div>
    </section>

  <footer>
    <p>&copy; 2025 ivandfx</p>
  </footer>

  <script>
    const toggle = document.getElementById('toggle-dark');
    const body = document.body;
    const savedTheme = localStorage.getItem('theme');

    if (savedTheme === 'dark') {
      body.classList.add('dark-mode');
      toggle.textContent = '🌙';
    } else {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (prefersDark) {
        body.classList.add('dark-mode');
        toggle.textContent = '🌙';
      }
    }

    toggle.addEventListener('click', () => {
      body.classList.toggle('dark-mode');
      const isDark = body.classList.contains('dark-mode');
      toggle.textContent = isDark ? '🌙' : '☀️';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('nav-menu');

    hamburger.addEventListener('click', () => {
      navMenu.classList.toggle('show');
    });
  </script>
</body>
</html>
